<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Luana & Adailton</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --verde: #5a6b47; /* Verde da sua logo */
            --dourado: #b5a46d;
            --off-white: #fafaf8;
        }

        body {
            background-color: var(--off-white);
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            color: var(--verde);
        }

        #game-container {
            width: 90%;
            max-width: 500px;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            border: 2px solid var(--dourado);
            position: relative;
        }

        .logo-font {
            font-family: 'Great Vibes', cursive;
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .progress-bar {
            height: 8px;
            background: #eee;
            border-radius: 4px;
            margin: 20px 0;
        }

        #progress {
            height: 100%;
            background: var(--dourado);
            width: 0%;
            transition: 0.5s;
            border-radius: 4px;
        }

        .pergunta {
            font-size: 1.2em;
            font-weight: bold;
            margin-bottom: 25px;
            min-height: 60px;
        }

        .opcoes {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn-opcao {
            padding: 15px;
            border: 2px solid var(--verde);
            background: transparent;
            color: var(--verde);
            border-radius: 10px;
            cursor: pointer;
            font-size: 1em;
            font-weight: 600;
            transition: all 0.2s;
        }

        .btn-opcao:hover {
            background: #f0f3eb;
        }

        .btn-opcao.correct {
            background-color: #2ecc71 !important;
            color: white;
            border-color: #27ae60;
        }

        .btn-opcao.wrong {
            background-color: #e74c3c !important;
            color: white;
            border-color: #c0392b;
        }

        #final-screen {
            display: none;
        }

        .frase-codigo {
            font-size: 1.5em;
            color: var(--dourado);
            font-weight: bold;
            margin-top: 20px;
            padding: 15px;
            border: 2px dashed var(--dourado);
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div class="logo-font">Luana & Adailton</div>
        <div id="quiz-ui">
            <div class="progress-bar"><div id="progress"></div></div>
            <div id="level-text" style="font-size: 0.8em; color: var(--dourado); margin-bottom: 5px;">Nível: Iniciante</div>
            <div class="pergunta" id="questionText">Carregando...</div>
            <div class="opcoes" id="optionsContainer"></div>
        </div>

        <div id="final-screen">
            <h2 class="logo-font">Parabéns!</h2>
            <p>Você provou que conhece bem o casal!</p>
            <p>Diga a frase abaixo ao bartender para seu drink especial:</p>
            <div class="frase-codigo">"O AMOR ESTÁ NO DRINK"</div>
            <p style="font-size: 0.8em; margin-top: 20px;">Válido apenas para hoje: 09/05/2026</p>
        </div>
    </div>

    <audio id="snd-correct" src="https://actions.google.com/sounds/v1/cartoon/clime_up_the_ladder.ogg"></audio>
    <audio id="snd-wrong" src="https://actions.google.com/sounds/v1/cartoon/boing.ogg"></audio>

    <script>
        const questions = [
            {
                q: "Qual o nome do filho do casal?",
                options: ["Lucas", "Luan", "Leonardo"],
                correct: 1,
                level: "Super Fácil"
            },
            {
                q: "O que estamos comemorando hoje?",
                options: ["Bodas de Cristal", "Bodas de Porcelana", "Bodas de Prata"],
                correct: 2,
                level: "Fácil"
            },
            {
                q: "Em que ano o casal se conheceu?",
                options: ["1998", "2000", "2001"],
                correct: 0,
                level: "Médio"
            },
            {
                q: "Onde o Adailton e a Luana se conheceram?",
                options: ["Na Faculdade", "No Quartel", "No Tênis"],
                correct: 1,
                level: "Desafio Final"
            }
        ];

        let currentQ = 0;
        const questionText = document.getElementById('questionText');
        const optionsContainer = document.getElementById('optionsContainer');
        const progress = document.getElementById('progress');
        const levelText = document.getElementById('level-text');

        function loadQuestion() {
            const qData = questions[currentQ];
            questionText.innerText = qData.q;
            levelText.innerText = `Nível: ${qData.level}`;
            optionsContainer.innerHTML = '';
            progress.style.width = `${(currentQ / questions.length) * 100}%`;

            qData.options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'btn-opcao';
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(index, btn);
                optionsContainer.appendChild(btn);
            });
        }

        function checkAnswer(selected, btn) {
            const correct = questions[currentQ].correct;
            const allBtns = document.querySelectorAll('.btn-opcao');
            
            allBtns.forEach(b => b.disabled = true);

            if (selected === correct) {
                btn.classList.add('correct');
                document.getElementById('snd-correct').play();
                setTimeout(() => {
                    currentQ++;
                    if (currentQ < questions.length) {
                        loadQuestion();
                    } else {
                        showFinal();
                    }
                }, 1500);
            } else {
                btn.classList.add('wrong');
                document.getElementById('snd-wrong').play();
                setTimeout(() => {
                    alert("Ops! Tente novamente para ganhar o drink.");
                    currentQ = 0; // Reinicia ou mantém? Aqui reinicia para dar emoção
                    loadQuestion();
                }, 1000);
            }
        }

        function showFinal() {
            document.getElementById('quiz-ui').style.display = 'none';
            document.getElementById('final-screen').style.display = 'block';
            progress.style.width = '100%';
            confetti({
                particleCount: 150,
                spread: 70,
                origin: { y: 0.6 },
                colors: ['#5a6b47', '#b5a46d', '#ffffff']
            });
        }

        loadQuestion();
    </script>
</body>
</html>
